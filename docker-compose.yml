version: '3.8'

services:
  # ── MongoDB ───────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: taskflow_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: taskflow
      MONGO_INITDB_ROOT_PASSWORD: taskflow_dev
      MONGO_INITDB_DATABASE: taskflow
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow_network

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - taskflow_network

  # ── Backend ───────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow_server
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./server/.env.docker
    depends_on:
      - mongodb
      - redis
    networks:
      - taskflow_network

  # ── Frontend ──────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow_client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server
    networks:
      - taskflow_network

volumes:
  mongo_data:
  redis_data:

networks:
  taskflow_network:
    driver: bridge
